name: Deploy fertilizantes.labtes.com.br

on:
  push:
    branches: [master]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          command_timeout: 20m
          script: |
            set -e
            DOMAIN="fertilizantes.labtes.com.br"
            REPO_URL="https://github.com/Labtes-Unioeste/Gerenciador.git"
            FALLBACK_DIR="/var/www/fertilizantes"

            echo "=== Descobrindo configuracao real do Nginx para $DOMAIN ==="
            NGINX_CONF_FILE=$(grep -rl "$DOMAIN" /etc/nginx/sites-enabled/ 2>/dev/null | head -1 || true)
            EXISTING_ROOT=""
            if [ -n "$NGINX_CONF_FILE" ]; then
              echo "Config encontrada: $NGINX_CONF_FILE"
              EXISTING_ROOT=$(grep -m1 -E "^\s*root\s+" "$NGINX_CONF_FILE" | awk '{print $2}' | tr -d ';' || true)
              echo "Root atual: $EXISTING_ROOT"
            else
              echo "Nenhuma config de Nginx encontrada para $DOMAIN em sites-enabled."
            fi

            if [ -n "$EXISTING_ROOT" ]; then
              if [ "$(basename "$EXISTING_ROOT")" = "dist" ]; then
                APP_DIR="$(dirname "$EXISTING_ROOT")"
              else
                APP_DIR="$EXISTING_ROOT"
              fi
            else
              APP_DIR="$FALLBACK_DIR"
            fi
            echo "=== Usando APP_DIR: $APP_DIR ==="

            mkdir -p "$APP_DIR"

            if [ -d "$APP_DIR/.git" ]; then
              cd "$APP_DIR"
              git fetch origin master
              git reset --hard origin/master
            else
              rm -rf "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
              cd "$APP_DIR"
            fi

            if ! command -v npm >/dev/null 2>&1 || [ "$(node -v | cut -d. -f1 | tr -d v)" -lt 20 ] 2>/dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y nodejs
            fi

            npm install
            npm run build

            if [ -z "$NGINX_CONF_FILE" ]; then
              echo "=== Criando nova configuracao Nginx (nenhuma existia) ==="
              cat > /etc/nginx/sites-available/fertilizantes <<'NGINX_CONF'
            server {
                listen 80;
                server_name fertilizantes.labtes.com.br;
                root /var/www/fertilizantes/dist;
                index index.html;

                location / {
                    try_files $uri $uri/ /index.html;
                }
            }
            NGINX_CONF
              ln -sf /etc/nginx/sites-available/fertilizantes /etc/nginx/sites-enabled/fertilizantes
            else
              echo "=== Config existente mantida, root ja aponta para $EXISTING_ROOT ==="
            fi

            nginx -t
            systemctl reload nginx

            echo "=== Deploy concluido em $(date) ==="
            echo "APP_DIR final: $APP_DIR"
            ls -la "$APP_DIR/dist" | head -5
