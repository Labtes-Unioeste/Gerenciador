name: Deploy fertilizantes.labtes.com.br

on:
  push:
    branches: [master]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          command_timeout: 20m
          script: |
            set -e
            APP_DIR="/var/www/fertilizantes"
            REPO_URL="https://github.com/Labtes-Unioeste/Gerenciador.git"

            mkdir -p "$APP_DIR"

            if [ -d "$APP_DIR/.git" ]; then
              cd "$APP_DIR"
              git fetch origin master
              git reset --hard origin/master
            else
              rm -rf "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
              cd "$APP_DIR"
            fi

            # Garante Node.js 20+ instalado
            if ! command -v npm >/dev/null 2>&1 || [ "$(node -v | cut -d. -f1 | tr -d v)" -lt 20 ] 2>/dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y nodejs
            fi

            npm install
            npm run build

            # Configura o Nginx na primeira execução, se ainda não existir
            if [ ! -f /etc/nginx/sites-available/fertilizantes ]; then
              cat > /etc/nginx/sites-available/fertilizantes <<'NGINX_CONF'
            server {
                listen 80;
                server_name fertilizantes.labtes.com.br;
                root /var/www/fertilizantes/dist;
                index index.html;

                location / {
                    try_files $uri $uri/ /index.html;
                }
            }
            NGINX_CONF
              ln -sf /etc/nginx/sites-available/fertilizantes /etc/nginx/sites-enabled/fertilizantes
            fi

            nginx -t
            systemctl reload nginx

            echo "Deploy concluido: $(date)"
